# quarjar-workflow-version: 0.2.1
name: Publish Quarto to Skilljar via GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.qmd"
      - "**/_quarto-skilljar.yml"
      - "**/publish-quarto-to-skilljar.yml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  detect:
    # Prevent the lesson-ID writeback commit from re-triggering this workflow.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-items: ${{ steps.set-matrix.outputs.has_items }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get changed QMD files
        id: changed-files
        # Skip per-file change detection when a config file changed — we can't
        # know which lessons were affected, so publish everything.
        if: >
          !contains(github.event.head_commit.modified, '_quarto-skilljar.yml')
          && !contains(github.event.head_commit.modified,
          'publish-quarto-to-skilljar.yml')
        uses: tj-actions/changed-files@v47
        with:
          files: "**/*.qmd"

      - name: Build matrix
        id: set-matrix
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          # Config-file pushes publish all lessons since we can't know which
          # were affected.
          HEAD_COMMIT_MODIFIED: ${{ toJson(github.event.head_commit.modified) }}
        run: |
          python3 << 'PYEOF'
          import yaml, json, os, re, glob

          # Determine whether a config file was touched in this push.
          try:
              modified = json.loads(os.environ.get('HEAD_COMMIT_MODIFIED', '[]') or '[]')
          except Exception:
              modified = []
          config_changed = any(
              '_quarto-skilljar.yml' in f or 'publish-quarto-to-skilljar.yml' in f
              for f in modified
          )

          FRONT_MATTER_SEP = re.compile(r'^---\s*$', re.MULTILINE)

          def parse_qmd(f):
              try:
                  with open(f) as fh:
                      content = fh.read()
                  parts = FRONT_MATTER_SEP.split(content, maxsplit=2)
                  # parts[0] must be empty (file starts with ---),
                  # parts[1] is the front matter, parts[2] is the body.
                  if len(parts) < 3 or parts[0].strip() != '':
                      print(f"Skipping {f}: no YAML front matter found")
                      return None
                  fm = yaml.safe_load(parts[1]) or {}

                  # Only the nested skilljar: block is supported.
                  # Files with flat skilljar_* keys will produce an empty
                  # course_id and be skipped here; the R layer will abort
                  # with a migration message if they reach it another way.
                  sj = fm.get('skilljar', {}) or {}
                  course_id = str(sj.get('course_id', '')).strip()

                  if not course_id:
                      print(f"Skipping {f}: no skilljar.course_id in front matter")
                      return None

                  return {
                      'qmd_file': f,
                      'course_id': course_id,
                      'lesson_title': str(fm.get('title', f)),
                      'package_title': str(sj.get('package_title', '')),
                      'base_url': 'https://api.skilljar.com',
                      'display_fullscreen': bool(sj.get('display_fullscreen', True)),
                      'lesson_order': sj.get('lesson_order', None),
                      'lesson_id': str(sj.get('lesson_id', '')),
                  }
              except Exception as e:
                  print(f"Warning: could not parse {f}: {e}")
                  return None

          if config_changed:
              print("Config file changed — publishing all lessons")
              candidates = glob.glob('**/content.qmd', recursive=True)
              files = sorted(candidates)
          else:
              changed = os.environ.get('CHANGED_FILES', '').strip()
              files = changed.split() if changed else []
              print(f"Publishing {len(files)} changed file(s)")

          items = []
          for f in files:
              item = parse_qmd(f)
              if item:
                  items.append(item)
                  print(f"Added {f}: course_id={item['course_id']!r}")

          matrix = {'include': items}
          print(f"Matrix ({len(items)} items): {json.dumps(matrix)}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"matrix={json.dumps(matrix)}\n")
              out.write(f"has_items={'true' if items else 'false'}\n")
          PYEOF

      - name: Debug matrix output
        env:
          MATRIX: ${{ steps.set-matrix.outputs.matrix }}
          HAS_ITEMS: ${{ steps.set-matrix.outputs.has_items }}
        run: |
          echo "has_items: ${HAS_ITEMS}"
          echo "matrix item count: $(echo '${MATRIX}' | python3 -c 'import json,sys; m=json.load(sys.stdin); print(len(m.get("include", [])))')" 2>/dev/null || true

  render-and-publish:
    needs: detect
    if: needs.detect.outputs.has-items == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false
      # max-parallel: 1 prevents concurrent pushes to gh-pages from conflicting.
      # Remove if you are confident files have distinct names and accept the
      # small risk of a push race (the losing job would simply need a re-run).
      max-parallel: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: >-
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version
            }}-${{ hashFiles('**/publish-quarto-to-skilljar.yml') }}
          restore-keys: >-
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libarchive-dev

      - name: Install R dependencies
        run: |
          options(repos = c(CRAN = "https://p3m.dev/cran/__linux__/noble/latest"))
          install.packages(c(
            "pak",
            # quarjar core deps
            "httr2", "rlang", "jsonlite", "curl", "cli", "withr",
            # Quarto rendering
            "knitr", "rmarkdown"
          ))
        shell: Rscript {0}

      - name: Install optional rendering packages
        # shinylive is recommended for interactive lessons but not required for
        # all content. Install separately so a failure here is non-blocking.
        continue-on-error: true
        run: |
          options(repos = c(CRAN = "https://p3m.dev/cran/__linux__/noble/latest"))
          install.packages("shinylive")
        shell: Rscript {0}

      - name: Install quarjar package
        env:
          GITHUB_PAT: ${{ secrets.REPO_PAT }}
        run: |
          pak::pak("posit-dev/quarjar")
        shell: Rscript {0}

      - name: Check workflow version
        run: |
          # Extract the version recorded in this workflow file.
          # NOTE: assumes the workflow file is installed under its default name.
          # If the file was renamed, the grep returns empty and the "not found" warning fires.
          WORKFLOW_VERSION=$(grep -m1 'quarjar-workflow-version:' \
            "${GITHUB_WORKSPACE}/.github/workflows/publish-quarto-to-skilljar.yml" \
            | sed 's/.*quarjar-workflow-version:[[:space:]]*//' \
            | tr -d '[:space:]')

          PKG_VERSION=$(Rscript -e "cat(as.character(packageVersion('quarjar')))")

          if [ -z "${WORKFLOW_VERSION}" ]; then
            echo "::warning::quarjar: workflow version comment not found. Add '# quarjar-workflow-version: X.Y.Z' to the top of this file."
          elif [ "${WORKFLOW_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::warning::quarjar: workflow template is version ${WORKFLOW_VERSION} but the installed quarjar package is ${PKG_VERSION}. Run quarjar::use_skilljar_workflow(overwrite = TRUE) to update the workflow."
          else
            echo "Workflow version ${WORKFLOW_VERSION} matches installed quarjar ${PKG_VERSION}."
          fi

      - name: Generate ZIP package from Quarto
        id: generate-zip
        env:
          QMD_FILE: ${{ matrix.qmd_file }}
        run: |
          library(quarjar)
          ci_generate_zip()
        shell: Rscript {0}

      - name: Deploy ZIP to GitHub Pages
        env:
          ZIP_PATH: ${{ steps.generate-zip.outputs.zip_path }}
          ZIP_FILENAME: ${{ steps.generate-zip.outputs.zip_filename }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p skilljar-zips
          cp "${ZIP_PATH}" skilljar-zips/

          # Keep only the 5 most recent ZIP files.
          cd skilljar-zips
          ls -t *.zip 2>/dev/null | tail -n +6 | xargs -r rm -f
          cd ..

          git add skilljar-zips/
          git commit -m "Deploy ${ZIP_FILENAME} to GitHub Pages" || echo "No changes to commit"
          git push origin gh-pages

      - name: Wait for GitHub Pages deployment
        id: wait-pages
        env:
          ZIP_FILENAME: ${{ steps.generate-zip.outputs.zip_filename }}
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          ZIP_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/skilljar-zips/${ZIP_FILENAME}"

          echo "Waiting for GitHub Pages to deploy: ${ZIP_URL}"

          MAX_ATTEMPTS=30
          ATTEMPT=1
          SUCCESS=0

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: checking ${ZIP_URL}..."
            if curl -sfIL --max-time 10 "${ZIP_URL}" > /dev/null 2>&1; then
              echo "GitHub Pages deployment confirmed."
              SUCCESS=1
              break
            fi
            echo "Not yet accessible. Waiting 10s..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "::error::GitHub Pages deployment timed out after 5 minutes. URL: ${ZIP_URL}"
            exit 1
          fi

          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Create Skilljar web package
        id: create-web-package
        env:
          SKILLJAR_API_KEY: ${{ secrets.SKILLJAR_API_KEY }}
          BASE_URL: ${{ matrix.base_url }}
          PACKAGE_TITLE: ${{ matrix.package_title }}
          LESSON_TITLE: ${{ matrix.lesson_title }}
          LESSON_ID: ${{ matrix.lesson_id }}
          ZIP_URL: ${{ steps.wait-pages.outputs.zip_url }}
        run: |
          library(quarjar)
          ci_create_web_package()
        shell: Rscript {0}

      - name: Create or update lesson
        id: create-or-update-lesson
        env:
          SKILLJAR_API_KEY: ${{ secrets.SKILLJAR_API_KEY }}
          COURSE_ID: ${{ matrix.course_id }}
          LESSON_TITLE: ${{ matrix.lesson_title }}
          BASE_URL: ${{ matrix.base_url }}
          DISPLAY_FULLSCREEN: ${{ matrix.display_fullscreen }}
          LESSON_ID: ${{ matrix.lesson_id }}
          LESSON_ORDER: ${{ matrix.lesson_order }}
          NEW_WEB_PACKAGE_ID: ${{ steps.create-web-package.outputs.new_web_package_id }}
        run: |
          library(quarjar)
          ci_create_or_update_lesson()
        shell: Rscript {0}

      - name: Delete old web package
        if: >
          steps.create-or-update-lesson.outputs.is_new_lesson == 'false' &&
          steps.create-web-package.outputs.old_web_package_id != ''
        env:
          SKILLJAR_API_KEY: ${{ secrets.SKILLJAR_API_KEY }}
          BASE_URL: ${{ matrix.base_url }}
          OLD_WEB_PACKAGE_ID: ${{ steps.create-web-package.outputs.old_web_package_id }}
        run: |
          library(quarjar)
          ci_delete_old_web_package()
        shell: Rscript {0}

      - name: Write lesson ID back to main
        if: steps.create-or-update-lesson.outputs.is_new_lesson == 'true'
        env:
          QMD_FILE: ${{ matrix.qmd_file }}
          LESSON_ID: ${{ steps.create-or-update-lesson.outputs.lesson_id }}
        run: |
          # Anchor to origin/main (job may be on gh-pages at this point).
          # reset --hard ensures the local branch reflects any commits pushed by
          # earlier matrix jobs (max-parallel: 1 serializes them but each starts
          # from the original trigger commit).
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          Rscript -e "library(quarjar); ci_write_lesson_id()"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet "${QMD_FILE}"; then
            echo "No front matter changes — skipping commit"
            exit 0
          fi

          git add "${QMD_FILE}"
          git commit -m "chore: record Skilljar lesson ID in ${QMD_FILE} [skip ci]"
          git push origin main

      - name: Validate front matter after lesson ID writeback
        if: steps.create-or-update-lesson.outputs.is_new_lesson == 'true'
        env:
          QMD_FILE: ${{ matrix.qmd_file }}
        run: |
          # Guard against silent ci_write_lesson_id() failure: if lesson_id is
          # absent after writeback, the next run would create a duplicate lesson.
          python3 - << 'PYEOF'
          import yaml, os, re, sys

          qmd_file = os.environ['QMD_FILE']
          with open(qmd_file) as fh:
              content = fh.read()

          sep = re.compile(r'^---\s*$', re.MULTILINE)
          parts = sep.split(content, maxsplit=2)
          if len(parts) < 3 or parts[0].strip() != '':
              print(f"ERROR: No YAML front matter found in {qmd_file}", file=sys.stderr)
              sys.exit(1)

          try:
              fm = yaml.safe_load(parts[1]) or {}
          except yaml.YAMLError as e:
              print(f"ERROR: Front matter is invalid YAML after writeback: {e}", file=sys.stderr)
              sys.exit(1)

          sj = fm.get('skilljar', {}) or {}
          if not sj.get('lesson_id', '').strip():
              print(f"ERROR: skilljar.lesson_id not found in {qmd_file} after writeback", file=sys.stderr)
              sys.exit(1)

          print(f"Front matter validation passed: skilljar.lesson_id = {sj['lesson_id']!r}")
          PYEOF

      - name: Cleanup old ZIP files from gh-pages
        if: always()
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || exit 0

          if [ ! -d "skilljar-zips" ]; then
            echo "skilljar-zips directory not found, nothing to clean up"
            exit 0
          fi

          cd skilljar-zips

          if ! ls *.zip >/dev/null 2>&1; then
            echo "No ZIP files found, nothing to clean up"
            exit 0
          fi

          OLD_ZIPS=$(ls -t *.zip 2>/dev/null | tail -n +6)

          if [ -n "$OLD_ZIPS" ]; then
            echo "Deleting old ZIP files: ${OLD_ZIPS}"
            echo "$OLD_ZIPS" | xargs rm -f
            git add -A
            git commit -m "chore: remove old skilljar ZIP files [skip ci]" || true
            git push origin gh-pages || echo "Failed to push cleanup"
          else
            echo "No old ZIP files to clean up"
          fi

      - name: Summary
        if: success()
        env:
          QMD_FILE: ${{ matrix.qmd_file }}
          ZIP_FILENAME: ${{ steps.generate-zip.outputs.zip_filename }}
          PAGES_URL: ${{ steps.wait-pages.outputs.zip_url }}
          WEB_PACKAGE_ID: ${{ steps.create-web-package.outputs.new_web_package_id }}
          COURSE_ID: ${{ matrix.course_id }}
          LESSON_TITLE: ${{ matrix.lesson_title }}
          LESSON_ID: ${{ steps.create-or-update-lesson.outputs.lesson_id }}
          IS_NEW_LESSON: ${{ steps.create-or-update-lesson.outputs.is_new_lesson }}
        run: |
          echo "### Published to Skilljar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **File**: \`${QMD_FILE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ZIP**: \`${ZIP_FILENAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages URL**: ${PAGES_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Package ID**: ${WEB_PACKAGE_ID}" >> $GITHUB_STEP_SUMMARY
          echo "- **Course ID**: ${COURSE_ID}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lesson**: ${LESSON_TITLE} (ID: ${LESSON_ID})" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_NEW_LESSON" = "true" ]; then
            echo "- **Action**: Created new lesson" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Action**: Updated existing lesson" >> $GITHUB_STEP_SUMMARY
          fi
